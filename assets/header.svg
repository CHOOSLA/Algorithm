<svg xmlns="http://www.w3.org/2000/svg" width="860" height="200" viewBox="0 0 860 200" role="img"
     font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161b22"/><stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ee6d6"/><stop offset="1" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="ul" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ee6d6"/><stop offset="1" stop-color="#2ee6d6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2ee6d6" stop-opacity="0.20"/><stop offset="1" stop-color="#2ee6d6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a371f7" stop-opacity="0.16"/><stop offset="1" stop-color="#a371f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0.5" y="0.5" width="859" height="199" rx="16" fill="url(#bg)" stroke="#30363d"/>
  <circle cx="110" cy="20" r="170" fill="url(#glowA)"/>
  <circle cx="720" cy="210" r="200" fill="url(#glowB)"/>

  <!-- 우측 회전 링 (카드 도넛 모티프) -->
  <g transform="translate(742 100)" fill="none" stroke-linecap="round">
    <circle r="76" stroke="#1f6feb" stroke-width="2" opacity="0.20" stroke-dasharray="70 400"/>
    <circle r="56" stroke="#2ee6d6" stroke-width="3" opacity="0.6" stroke-dasharray="120 260">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle r="38" stroke="#a371f7" stroke-width="2.5" opacity="0.5" stroke-dasharray="80 160">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#2ee6d6" stroke="none"/>
  </g>

  <text x="42" y="52" font-size="12" font-weight="700" letter-spacing="3" fill="#2ee6d6">DAILY PROBLEM SOLVING</text>
  <text x="40" y="104" font-size="46" font-weight="800" fill="url(#tg)">Algorithm Lab</text>
  <rect x="42" y="118" width="150" height="3" rx="1.5" fill="url(#ul)"/>

  <!-- 사이클링 태그라인 (9s 루프, 3줄 크로스페이드) -->
  <text x="42" y="156" font-size="15" fill="#7d8590" font-weight="500">&#8250;</text>
  <g font-size="15" font-weight="600">
    <text x="56" y="156" fill="#c9d1d9" opacity="0">Codetree &#183; 프로그래머스 &#183; SWEA &#183; BaekJoon
      <animate attributeName="opacity" values="1;1;0;0;0;1" keyTimes="0;0.30;0.35;0.95;0.99;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="56" y="156" fill="#c9d1d9" opacity="0">매일 한 문제씩, 꾸준히
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.32;0.37;0.63;0.68;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="56" y="156" fill="#c9d1d9" opacity="0">Implement &#8594; Simulation &#8594; Graph &#8594; Beyond
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.65;0.70;0.97;1" dur="9s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
