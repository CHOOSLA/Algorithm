# 알고리즘 저장소 메타데이터 단일 소스.
# 이 파일을 갱신하면 `python3 scripts/generate_readme.py` 가 readme.md 를 다시 빌드한다.
#
# 새 문제 추가 절차:
#   1. 문제 폴더 생성 후 소스 커밋
#   2. 이 파일에 한 줄 추가
#   3. 스크립트 실행 → readme.md 갱신
#
# Baekjoon 카테고리는 폴더명과 일치해야 한다. `display` 는 표 헤더에 표시될 라벨.
# `open = true` 인 카테고리는 README 에서 기본 펼침 상태.

