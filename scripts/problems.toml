#######################################
# Codetree (자동 스캔)
#######################################
#
# Codetree 는 폴더명 자체가 한글 문제 제목이므로 메타를 일일이 적지 않는다.
# 빌더가 Codetree/<trail>/<problem> 구조를 스캔해 표·차트·진도를 자동 생성한다.
#
# - codetree_trails: 트레일 폴더의 표시 이름 + (선택) total. total 이 있으면 진도율(%) 계산.
# - codetree_overrides: 폴더명이 영어 등으로 적힌 경우 표시 이름을 한글로 매핑.

[codetree_trails.Implement]
display = "Implement"
# total = 0  # Codetree 의 Implement 트레일 총 문제 수를 알면 채우기

[codetree_trails.trail2]
display = "Trail 2"
# total = 0  # Codetree 의 Trail 2 총 문제 수

[codetree_overrides]
# (현재 override 가 필요한 항목 없음 — 새 영어 폴더가 생기면 여기에 한글 표시명 매핑)

