name: README 동기화 검증

# readme.md 가 scripts/problems.toml 과 실제 폴더 상태에 부합하는지 검증한다.
# 실패하면 로컬에서 `python3 scripts/generate_readme.py` 를 실행해 갱신 후 다시 push.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # 빌더가 git log 를 분석해 SWEA 메타·타임라인·도전 기록을 만들기 때문에
          # shallow clone 으로는 결과가 달라진다. 전체 히스토리를 가져온다.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: readme.md 일관성 검사 (strict)
        run: python3 scripts/generate_readme.py --check --strict
